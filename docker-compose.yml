version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: qaz369000  # 这里设置你的数据库密码
      MYSQL_DATABASE: wallet_db         # 初始创建的数据库名
    ports:
      - "3306:3306"                      # 将容器的3306端口映射到你电脑的3306
    volumes:
      - db_data:/var/lib/mysql           # 数据持久化，防止删掉容器后数据丢失

volumes:
  db_data: